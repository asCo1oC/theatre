services:
  ogatt-booker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    # The container entrypoint will start the bot automatically.
    volumes:
      - ./:/app:ro
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - ./data:/app/data
    shm_size: "2gb"
    restart: unless-stopped
