services:
  ogatt-booker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "ogatt_booker", "watch", "--title", "Евгений Онегин", "--seats", "2", "--interval", "120"]
    ports:
      - "8080:8080"   # optional future handoff/web UI
      - "5900:5900"   # VNC
      - "6080:6080"   # noVNC
    volumes:
      - ./:/app
      - ./artifacts:/app/artifacts
    shm_size: "2gb"
    restart: unless-stopped
